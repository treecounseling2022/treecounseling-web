<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>邀請加入 樹心理工作室</title>
</head>
<body style="margin:0;padding:0;background-color:#F0EBE1;font-family:Arial,Helvetica,sans-serif;">
  <table width="100%" cellpadding="0" cellspacing="0" style="background-color:#F0EBE1;padding:48px 16px;">
    <tr>
      <td align="center">
        <table width="560" cellpadding="0" cellspacing="0" style="max-width:560px;width:100%;">

          <!-- Logo / Brand -->
          <tr>
            <td align="center" style="padding-bottom:40px;">
              <div style="display:inline-block;border-bottom:2px solid #2D5A3D;padding-bottom:8px;">
                <span style="font-family:Georgia,'Times New Roman',serif;font-size:22px;color:#1A2E1E;letter-spacing:0.08em;">樹心理工作室</span>
              </div>
            </td>
          </tr>

          <!-- Card -->
          <tr>
            <td style="background-color:#FDFAF5;padding:48px 48px 40px;">

              <!-- Greeting icon -->
              <table width="100%" cellpadding="0" cellspacing="0">
                <tr>
                  <td align="center" style="padding-bottom:28px;">
                    <div style="width:56px;height:56px;background-color:#EAF1EC;border-radius:50%;text-align:center;line-height:56px;font-size:26px;">🌱</div>
                  </td>
                </tr>

                <tr>
                  <td align="center" style="padding-bottom:12px;">
                    <p style="margin:0;font-family:Georgia,'Times New Roman',serif;font-size:22px;color:#1A2E1E;font-weight:400;letter-spacing:0.02em;">您已收到邀請</p>
                  </td>
                </tr>

                <tr>
                  <td align="center" style="padding-bottom:32px;">
                    <p style="margin:0;font-size:14px;color:#5A7060;line-height:1.7;">
                      您被邀請加入 <strong style="color:#1A2E1E;">樹心理工作室</strong> 後台系統。<br />
                      請點擊下方按鈕設定您的登入密碼，完成帳號啟用。
                    </p>
                  </td>
                </tr>

                <!-- CTA Button -->
                <tr>
                  <td align="center" style="padding-bottom:36px;">
                    <a href="{{ .ConfirmationURL }}"
                       style="display:inline-block;background-color:#2D5A3D;color:#FDFAF5;text-decoration:none;font-size:13px;letter-spacing:0.1em;padding:14px 40px;font-family:Arial,Helvetica,sans-serif;">
                      啟用帳號並設定密碼
                    </a>
                  </td>
                </tr>

                <!-- Divider -->
                <tr>
                  <td style="border-top:1px solid #E2D9CC;padding-top:24px;padding-bottom:8px;">
                    <p style="margin:0;font-size:11px;color:#9DA89E;line-height:1.7;text-align:center;">
                      此連結將於 <strong>24 小時</strong>後失效。若您未預期收到此信，請忽略。<br />
                      如有疑問，請聯繫 <a href="mailto:admin@treecounseling.com" style="color:#2D5A3D;text-decoration:none;">admin@treecounseling.com</a>
                    </p>
                  </td>
                </tr>

                <!-- Fallback URL -->
                <tr>
                  <td style="padding-top:20px;">
                    <p style="margin:0;font-size:10px;color:#B0B8AF;text-align:center;line-height:1.6;">
                      若按鈕無法點擊，請複製以下連結至瀏覽器：<br />
                      <span style="color:#5A7060;word-break:break-all;">{{ .ConfirmationURL }}</span>
                    </p>
                  </td>
                </tr>
              </table>

            </td>
          </tr>

          <!-- Footer -->
          <tr>
            <td align="center" style="padding-top:32px;padding-bottom:8px;">
              <p style="margin:0;font-size:11px;color:#9DA89E;line-height:1.8;">
                樹心理工作室 · Tree Counseling Studio<br />
                <a href="https://treecounseling.com" style="color:#5A7060;text-decoration:none;">treecounseling.com</a>
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
</html>
